global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'inferx-monitor'

scrape_configs:
  - job_name: 'inferx-api'
    static_configs:
      - targets: ['api:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'inferx-workers'
    static_configs:
      - targets: ['api:8001', 'api:8002']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
