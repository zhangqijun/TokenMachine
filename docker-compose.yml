version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: inferx-postgres
    environment:
      POSTGRES_DB: inferx
      POSTGRES_USER: inferx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inferx_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inferx"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inferx-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: inferx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inferx-network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inferx-api
    environment:
      DATABASE_URL: postgresql://inferx:${POSTGRES_PASSWORD:-inferx_password}@postgres:5432/inferx
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      MODEL_STORAGE_PATH: /var/lib/inferx/models
      LOG_PATH: /var/log/inferx
      ENVIRONMENT: production
      DEBUG: "false"
    volumes:
      - model_data:/var/lib/inferx/models
      - log_data:/var/log/inferx
    ports:
      - "8000:8000"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inferx-network
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: inferx-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - inferx-network
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: inferx-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - inferx-network
    restart: unless-stopped

  # Frontend Web Application
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: inferx-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ~/zhangqijun.cn_apache:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - inferx-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  model_data:
  log_data:
  prometheus_data:
  grafana_data:

networks:
  inferx-network:
    driver: bridge
