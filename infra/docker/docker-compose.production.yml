# Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
# 生产环境 (Bowser) - RTX 3090 - HTTPS 证书 + 路由器配置

services:
  # API with production settings
  api:
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      VLLM_DISABLE_CUSTOM_ALL_REDUCE: "true"  # Driver workaround
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Web with SSL support
  web:
    container_name: tokenmachine-web-prod
    ports:
      - "8080:80"   # HTTP (redirect to HTTPS)
      - "8443:443"  # HTTPS
    environment:
      ENVIRONMENT: production
      API_BASE_URL: https://zhangqijun.cn:8443/api
      PUBLIC_DOMAIN: zhangqijun.cn
      USE_MOCK_DATA: "false"
    volumes:
      # Mount SSL certificates
      - ~/zhangqijun.cn_apache:/etc/nginx/ssl:ro
      # Custom nginx config for production
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    networks:
      - tokenmachine-network
    restart: unless-stopped

  # Grafana with production settings
  grafana:
    container_name: tokenmachine-grafana-prod
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: https://zhangqijun.cn:3001
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana:/etc/grafana/provisioning
    restart: unless-stopped

  # Prometheus with production settings
  prometheus:
    container_name: tokenmachine-prometheus-prod
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
