[pytest]
# Pytest configuration for InferX

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables on failure
    --showlocals
    # Show summary of test session duration
    -d
    # Warning settings
    -W ignore::DeprecationWarning

# Markers for organizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use external resources)
    slow: Slow running tests
    gpu: Tests that require GPU access
    auth: Tests related to authentication

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (if pytest-timeout is installed)
timeout = 300

# Minimum version
minversion = 7.0

# Ignore paths
norecursedir = .git .tox dist build *.egg venv env

# Asyncio configuration
asyncio_mode = auto
