[pytest]
# Pytest configuration for GPU Agent tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Test paths
testpaths = worker/tests

# Default options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=worker
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --timeout=300

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    requires_backend: marks tests that require backend server
    requires_ssh: marks tests that require SSH access to GPU machine

# Timeout
timeout = 300

# Coverage settings
[coverage:run]
source = worker
omit =
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
